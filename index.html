<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold-glow: #FFA500;
    --silver: #C0C0C0;
    --bronze: #CD7F32;
    --bg-deep: #0a0618;
    --bg-mid: #120d2a;
    --bg-card: #1a1040;
    --accent-blue: #4f8ef7;
    --accent-purple: #7c3aed;
    --accent-cyan: #00d4ff;
    --accent-pink: #ff4da6;
    --positive: #00e676;
    --negative: #ff1744;
    --text-primary: #e8e0ff;
    --text-muted: #8b7ec8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-deep);
    font-family: 'Exo 2', sans-serif;
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(0,212,255,0.1) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(79,142,247,0.05) 0%, transparent 70%);
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(79,142,247,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(79,142,247,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeDown 0.6s ease;
  }

  .trophy-icon {
    font-size: 2.5rem;
    filter: drop-shadow(0 0 12px var(--gold));
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 12px var(--gold)); }
    50% { filter: drop-shadow(0 0 24px var(--gold-glow)); }
  }

  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, #fff 0%, var(--accent-cyan) 50%, var(--accent-purple) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* Podium Section */
  .podium-section {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 16px;
    margin-bottom: 50px;
    padding: 0 20px;
  }

  .podium-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    animation: riseUp 0.8s ease both;
  }

  .podium-item:nth-child(1) { animation-delay: 0.3s; }
  .podium-item:nth-child(2) { animation-delay: 0.1s; }
  .podium-item:nth-child(3) { animation-delay: 0.5s; }

  @keyframes riseUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes fadeDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .podium-avatar-wrap {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .podium-item.rank-1 .podium-avatar-wrap { width: 110px; height: 110px; }

  .podium-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.8rem;
    color: #fff;
    position: relative;
    overflow: hidden;
  }

  .rank-1 .podium-avatar {
    background: linear-gradient(135deg, #1a0a00, #3d1a00);
    border: 3px solid var(--gold);
    box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(255,165,0,0.3), inset 0 0 20px rgba(255,215,0,0.1);
    font-size: 2rem;
  }

  .rank-2 .podium-avatar {
    background: linear-gradient(135deg, #0a0a15, #1a1a30);
    border: 3px solid var(--silver);
    box-shadow: 0 0 20px rgba(192,192,192,0.5), inset 0 0 15px rgba(192,192,192,0.1);
  }

  .rank-3 .podium-avatar {
    background: linear-gradient(135deg, #150500, #2a0f00);
    border: 3px solid var(--bronze);
    box-shadow: 0 0 20px rgba(205,127,50,0.5), inset 0 0 15px rgba(205,127,50,0.1);
  }

  .rank-badge {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1.3rem;
    z-index: 2;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));
  }

  .podium-block {
    width: 140px;
    border-radius: 12px 12px 0 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 10px;
    position: relative;
    overflow: hidden;
  }

  .rank-1 .podium-block {
    height: 130px;
    background: linear-gradient(180deg, rgba(255,215,0,0.25) 0%, rgba(255,165,0,0.1) 100%);
    border: 1px solid rgba(255,215,0,0.4);
    box-shadow: 0 0 20px rgba(255,215,0,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
  }

  .rank-2 .podium-block {
    height: 95px;
    background: linear-gradient(180deg, rgba(192,192,192,0.2) 0%, rgba(192,192,192,0.05) 100%);
    border: 1px solid rgba(192,192,192,0.3);
    box-shadow: 0 0 15px rgba(192,192,192,0.15);
  }

  .rank-3 .podium-block {
    height: 75px;
    background: linear-gradient(180deg, rgba(205,127,50,0.2) 0%, rgba(205,127,50,0.05) 100%);
    border: 1px solid rgba(205,127,50,0.3);
    box-shadow: 0 0 15px rgba(205,127,50,0.15);
  }

  .podium-block::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .rank-1 .podium-block::before { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .rank-2 .podium-block::before { background: var(--silver); }
  .rank-3 .podium-block::before { background: var(--bronze); }

  .podium-name {
    font-family: 'Orbitron', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .rank-1 .podium-name { color: var(--gold); font-size: 0.7rem; }
  .rank-2 .podium-name { color: var(--silver); }
  .rank-3 .podium-name { color: var(--bronze); }

  .podium-value {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-primary);
    opacity: 0.9;
  }

  /* Stats bar above list */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s ease 0.2s both;
  }

  .stat-pill {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-pill span { color: var(--text-primary); font-weight: 600; }

  /* Ranking list */
  .ranking-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .rank-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 40px 1fr auto;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease both;
  }

  .rank-card:nth-child(1) { animation-delay: 0.05s; }
  .rank-card:nth-child(2) { animation-delay: 0.10s; }
  .rank-card:nth-child(3) { animation-delay: 0.15s; }
  .rank-card:nth-child(4) { animation-delay: 0.20s; }
  .rank-card:nth-child(5) { animation-delay: 0.25s; }
  .rank-card:nth-child(6) { animation-delay: 0.30s; }
  .rank-card:nth-child(7) { animation-delay: 0.35s; }
  .rank-card:nth-child(8) { animation-delay: 0.40s; }
  .rank-card:nth-child(9) { animation-delay: 0.45s; }
  .rank-card:nth-child(10) { animation-delay: 0.50s; }
  .rank-card:nth-child(11) { animation-delay: 0.55s; }
  .rank-card:nth-child(12) { animation-delay: 0.60s; }

  @keyframes slideIn {
    from { transform: translateX(-30px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .rank-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: transparent;
    transition: all 0.3s ease;
  }

  .rank-card:hover {
    background: rgba(79,142,247,0.08);
    border-color: rgba(79,142,247,0.3);
    transform: translateX(4px);
    box-shadow: 0 4px 20px rgba(79,142,247,0.15);
  }

  .rank-card:hover::before { background: var(--accent-blue); }

  .rank-card.highlight {
    background: rgba(255,215,0,0.06);
    border-color: rgba(255,215,0,0.25);
  }

  .rank-number {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: 1rem;
    text-align: center;
    color: var(--text-muted);
    min-width: 30px;
  }

  .rank-number.top { color: var(--accent-cyan); }

  .seller-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .seller-main {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar-mini {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.85rem;
    flex-shrink: 0;
    color: #fff;
  }

  .seller-name {
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--text-primary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .seller-partner {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 48px;
  }

  .seller-partner span {
    color: var(--accent-cyan);
    opacity: 0.8;
  }

  .points-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }

  .points-value {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }

  .points-value.positive {
    color: var(--positive);
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.25);
  }

  .points-value.negative {
    color: var(--negative);
    background: rgba(255,23,68,0.1);
    border: 1px solid rgba(255,23,68,0.2);
  }

  .points-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .revenue-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    min-width: 120px;
  }

  .revenue-value {
    font-weight: 700;
    font-size: 0.9rem;
    color: var(--text-primary);
  }

  .revenue-bar-wrap {
    width: 100%;
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .revenue-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  /* Avatar color palette */
  .av-0 { background: linear-gradient(135deg, #7c3aed, #4f8ef7); }
  .av-1 { background: linear-gradient(135deg, #ec4899, #8b5cf6); }
  .av-2 { background: linear-gradient(135deg, #06b6d4, #3b82f6); }
  .av-3 { background: linear-gradient(135deg, #f59e0b, #ef4444); }
  .av-4 { background: linear-gradient(135deg, #10b981, #059669); }
  .av-5 { background: linear-gradient(135deg, #f97316, #dc2626); }
  .av-6 { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
  .av-7 { background: linear-gradient(135deg, #14b8a6, #0ea5e9); }
  .av-8 { background: linear-gradient(135deg, #d946ef, #7c3aed); }
  .av-9 { background: linear-gradient(135deg, #84cc16, #22c55e); }
  .av-10 { background: linear-gradient(135deg, #fb923c, #f59e0b); }
  .av-11 { background: linear-gradient(135deg, #38bdf8, #818cf8); }
  .av-12 { background: linear-gradient(135deg, #a855f7, #ec4899); }

  /* Last card highlight */
  .rank-card.last-place {
    background: rgba(255,23,68,0.05);
    border-color: rgba(255,23,68,0.15);
  }

  .rank-card.last-place::before { background: var(--negative); opacity: 0.5; }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 30px;
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeDown 0.6s ease 0.8s both;
  }

  .footer span {
    color: var(--accent-cyan);
    font-family: 'Orbitron', monospace;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--accent-purple); border-radius: 3px; }

  @media (max-width: 600px) {
    .revenue-col { display: none; }
    .rank-card { grid-template-columns: 32px 1fr auto; }
    .podium-block { width: 110px; }
    .header h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="trophy-icon">🏆</div>
    <h1>Ranking de Vendas</h1>
    <div class="trophy-icon">🏆</div>
  </div>

  <!-- Podium Top 3 -->
  <div class="podium-section">
    <!-- 2nd place -->
    <div class="podium-item rank-2">
      <div class="podium-avatar-wrap">
        <div class="rank-badge">🥈</div>
        <div class="podium-avatar" id="pod2" style="overflow:hidden;padding:0;border:3px solid var(--silver);box-shadow:0 0 20px rgba(192,192,192,0.5)"><img style="width:100%;height:100%;object-fit:cover;border-radius:50%" /></div>
      </div>
      <div class="podium-block rank-2">
        <div class="podium-name">Marcelo</div>
        <div class="podium-value">107.500 pts</div>
      </div>
    </div>

    <!-- 1st place -->
    <div class="podium-item rank-1">
      <div class="podium-avatar-wrap">
        <div class="rank-badge">👑</div>
        <div class="podium-avatar" id="pod1" style="overflow:hidden;padding:0;border:3px solid var(--gold);box-shadow:0 0 30px rgba(255,215,0,0.6)"><img style="width:100%;height:100%;object-fit:cover;border-radius:50%" /></div>
      </div>
      <div class="podium-block rank-1">
        <div class="podium-name">Wclayton</div>
        <div class="podium-value">128.000 pts</div>
      </div>
    </div>

    <!-- 3rd place -->
    <div class="podium-item rank-3">
      <div class="podium-avatar-wrap">
        <div class="rank-badge">🥉</div>
        <div class="podium-avatar" id="pod3" style="overflow:hidden;padding:0;border:3px solid var(--bronze);box-shadow:0 0 20px rgba(205,127,50,0.5)"><img style="width:100%;height:100%;object-fit:cover;border-radius:50%" /></div>
      </div>
      <div class="podium-block rank-3">
        <div class="podium-name">Guilherme</div>
        <div class="podium-value">95.000 pts</div>
      </div>
    </div>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-pill">👤 <span>14</span> Vendedores</div>
    <div class="stat-pill">🏆 Líder: <span>128.000 pts</span></div>
    <div class="stat-pill">📊 Total: <span>14</span> representantes</div>
  </div>

  <!-- Full Ranking List -->
  <div class="ranking-list" id="rankingList"></div>

  <div class="footer">Atualizado em tempo real &nbsp;·&nbsp; <span>VENDAS 2025</span></div>
</div>

<style>
  /* ── Reveal overlay ── */
  #revealOverlay {
    position: fixed; inset: 0; z-index: 1000;
    background: radial-gradient(ellipse at center, #1a0a40 0%, #0a0618 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }

  #revealOverlay h2 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 3.5vw, 2rem);
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* big countdown number */
  #revealOverlay .big-num {
    font-family: 'Orbitron', monospace;
    font-size: clamp(5rem, 18vw, 11rem);
    font-weight: 900;
    background: linear-gradient(135deg, #fff, var(--accent-cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    filter: drop-shadow(0 0 40px rgba(0,212,255,0.7));
    transition: transform 0.15s ease, opacity 0.15s ease;
    margin-bottom: 24px;
  }

  /* card that slides in during reveal */
  .reveal-card {
    background: var(--bg-card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 30px 40px;
    display: flex;
    align-items: center;
    gap: 28px;
    min-width: min(680px, 92vw);
    max-width: 780px;
    position: relative;
    overflow: hidden;
    transform: scale(0.7) translateY(40px);
    opacity: 0;
    transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
  }
  .reveal-card.show { transform: scale(1) translateY(0); opacity: 1; }

  .reveal-card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 4px;
  }
  .reveal-card.top1::before { background: var(--gold); box-shadow: 0 0 10px var(--gold); }
  .reveal-card.top2::before { background: var(--silver); }
  .reveal-card.top3::before { background: var(--bronze); }
  .reveal-card.other::before { background: var(--accent-blue); }

  .reveal-rank-num {
    font-family: 'Orbitron', monospace;
    font-size: 3rem;
    font-weight: 900;
    min-width: 70px;
    text-align: center;
  }
  .reveal-card.top1 .reveal-rank-num { color: var(--gold); filter: drop-shadow(0 0 8px var(--gold)); }
  .reveal-card.top2 .reveal-rank-num { color: var(--silver); }
  .reveal-card.top3 .reveal-rank-num { color: var(--bronze); }
  .reveal-card.other .reveal-rank-num { color: var(--text-muted); }

  .reveal-avatar {
    width: 110px; height: 110px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 1.8rem; color: #fff;
    flex-shrink: 0;
  }
  .reveal-card.top1 .reveal-avatar { border: 4px solid var(--gold); box-shadow: 0 0 24px rgba(255,215,0,0.6); }
  .reveal-card.top2 .reveal-avatar { border: 4px solid var(--silver); }
  .reveal-card.top3 .reveal-avatar { border: 4px solid var(--bronze); }

  .reveal-info { flex: 1; }
  .reveal-name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.2rem, 3.5vw, 1.8rem);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .reveal-prize {
    font-size: 1rem;
    color: var(--accent-cyan);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .reveal-revenue {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .reveal-prize-badge {
    background: rgba(255,215,0,0.12);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
    padding: 12px 20px;
    text-align: center;
    flex-shrink: 0;
  }
  .reveal-prize-badge .prize-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 700;
    color: var(--gold);
  }
  .reveal-prize-badge .prize-label {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Points counter inside reveal card */
  .reveal-pts-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 10px;
  }
  .reveal-pts-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--text-muted);
    font-family: 'Orbitron', monospace;
  }
  .reveal-pts-val {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    font-weight: 900;
    color: var(--accent-cyan);
    filter: drop-shadow(0 0 8px rgba(0,212,255,0.5));
    letter-spacing: 1px;
  }
  .reveal-card.top1 .reveal-pts-val { color: var(--gold); filter: drop-shadow(0 0 10px rgba(255,215,0,0.7)); }
  .reveal-card.top2 .reveal-pts-val { color: var(--silver); }
  .reveal-card.top3 .reveal-pts-val { color: var(--bronze); }

  /* Rank number pop animation reset */
  .reveal-rank-num { transition: none; }

  /* skip button */
  #skipBtn {
    position: fixed; bottom: 24px; right: 24px; z-index: 1100;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    font-family: 'Exo 2', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  #skipBtn:hover { background: rgba(255,255,255,0.15); color: var(--text-primary); }

  /* confetti canvas */
  #confettiCanvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 1050;
    display: none;
  }

  /* prize tag on normal ranking cards */
  .prize-tag {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--gold);
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.25);
    border-radius: 6px;
    padding: 2px 8px;
    white-space: nowrap;
  }
  .prize-tag.small { color: var(--accent-cyan); background: rgba(0,212,255,0.07); border-color: rgba(0,212,255,0.2); }

  /* pulse ring for top1 card reveal */
  @keyframes ringPulse {
    0% { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  .ring-fx {
    position: absolute; inset: 0;
    border-radius: 16px;
    border: 2px solid var(--gold);
    animation: ringPulse 0.8s ease-out forwards;
    pointer-events: none;
  }
</style>

    overlay.appendChild(cardEl);

    requestAnimationFrame(() => requestAnimationFrame(() => {
      cardEl.classList.add('show');
      // animate rank number pop
      const rnEl = document.getElementById('rrn-' + rank);
      if (rnEl) {
        rnEl.style.transform = 'scale(0)';
        rnEl.style.opacity = '0';
        setTimeout(() => {
          rnEl.style.transition = 'transform 0.5s cubic-bezier(0.34,1.8,0.64,1), opacity 0.3s ease';
          rnEl.style.transform = 'scale(1)';
          rnEl.style.opacity = '1';
        }, 200);
      }
      // animate points count-up
      const ptsEl = document.getElementById('rpts-' + rank);
      if (ptsEl) {
        const target = s.points;
        const duration = 900;
        const start = performance.now();
        function countUp(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          ptsEl.textContent = Math.round(eased * target).toLocaleString('pt-BR');
          if (progress < 1) requestAnimationFrame(countUp);
        }
        setTimeout(() => requestAnimationFrame(countUp), 350);
      }
    }));
  }

  function doNextReveal() {
    if (currentReveal < 1) {
      finishReveal();
      return;
    }

    // animate big number with dramatic flash
    bigNum.style.transition = 'none';
    bigNum.style.transform = 'scale(2)';
    bigNum.style.opacity = '0';
    setTimeout(() => {
      bigNum.textContent = currentReveal + '°';
      bigNum.style.transition = 'transform 0.35s cubic-bezier(0.34,1.6,0.64,1), opacity 0.25s ease';
      bigNum.style.transform = 'scale(1)';
      bigNum.style.opacity = '1';
    }, 80);

    showRevealCard(currentReveal);

    const delay = 2000;
    currentReveal--;
    revealTimer = setTimeout(doNextReveal, delay);
  }

  function finishReveal() {
    // confetti for winner
    launchConfetti();
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.8s ease';
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.remove();
        document.getElementById('skipBtn').remove();
        document.getElementById('confettiCanvas').remove();
        // show all ranking cards
        document.querySelectorAll('.rank-card').forEach((c, i) => {
          setTimeout(() => {
            c.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
            c.style.transform = 'translateX(-20px)';
            c.style.opacity = '1';
            requestAnimationFrame(() => requestAnimationFrame(() => {
              c.style.transform = 'translateX(0)';
            }));
          }, i * 60);
        });
        setTimeout(() => {
          document.querySelectorAll('.revenue-bar').forEach(bar => {
            bar.style.width = bar.dataset.pct + '%';
          });
        }, 800);
      }, 800);
    }, 2400);
  }

  document.getElementById('skipBtn').addEventListener('click', () => {
    clearTimeout(revealTimer);
    finishReveal();
  });

  // start after short pause
  setTimeout(doNextReveal, 800);

  /* ── Confetti ── */
  function launchConfetti() {
    const canvas = document.getElementById('confettiCanvas');
    canvas.style.display = 'block';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const ctx = canvas.getContext('2d');
    const pieces = Array.from({length: 160}, () => ({
      x: Math.random() * canvas.width,
      y: -20,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: ['#FFD700','#00d4ff','#ff4da6','#7c3aed','#00e676','#fff'][Math.floor(Math.random()*6)],
      speed: Math.random() * 4 + 2,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 6,
      drift: (Math.random() - 0.5) * 2,
    }));
    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        p.y += p.speed;
        p.x += p.drift;
        p.angle += p.spin;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (pieces.some(p => p.y < canvas.height)) {
        frame = requestAnimationFrame(draw);
      } else {
        canvas.style.display = 'none';
        cancelAnimationFrame(frame);
      }
    }
    draw();
  }
</script>
